version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - gosec
    - copyloopvar
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable:
        - shadow
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
    gosec:
      excludes:
        - G101
        - G304
        - G404
    misspell:
      locale: US
  exclusions:
    paths:
      - vendor
    presets: []
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: zz_generated
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
